<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg-primary: #0d1117;
            --color-bg-secondary: #161b22;
            --color-bg-tertiary: #21262d;
            --color-border-primary: #30363d;
            --color-text-primary: #c9d1d9;
            --color-text-secondary: #8b949e;
            --color-accent: #58a6ff;
            --color-accent-hover: #79c0ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        .header {
            background-color: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border-primary);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text-primary);
            text-decoration: none;
            cursor: pointer;
        }

        .logo:hover {
            color: var(--color-accent);
        }

        .main-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
            padding: 40px 16px;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin-top: 20px;
            margin-bottom: 8px;
            padding: 0 12px;
            letter-spacing: 0.5px;
        }

        .sidebar-section-title:first-child {
            margin-top: 0;
        }

        .sidebar-nav-item {
            margin-bottom: 0;
        }

        .sidebar-nav-link {
            display: block;
            padding: 8px 12px;
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: 6px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .sidebar-nav-link:hover {
            color: var(--color-accent);
            background-color: var(--color-bg-tertiary);
        }

        .sidebar-nav-link.active {
            color: var(--color-accent);
            border-left-color: var(--color-accent);
            background-color: var(--color-bg-tertiary);
        }

        .sidebar-children {
            list-style: none;
            margin-left: 0;
        }

        .sidebar-children .sidebar-nav-link {
            padding-left: 24px;
        }

        .content {
            flex: 1;
            min-width: 0;
            max-width: 900px;
        }

        .markdown-content {
            color: var(--color-text-primary);
        }

        .markdown-content h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-top: 0;
            color: var(--color-text-primary);
        }

        .markdown-content h2 {
            font-size: 20px;
            font-weight: 600;
            margin-top: 32px;
            margin-bottom: 16px;
            color: var(--color-text-primary);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--color-border-primary);
        }

        .markdown-content h3 {
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--color-text-primary);
        }

        .markdown-content p {
            margin-bottom: 16px;
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        .markdown-content a {
            color: var(--color-accent);
            text-decoration: none;
        }

        .markdown-content a:hover {
            color: var(--color-accent-hover);
            text-decoration: underline;
        }

        .markdown-content code {
            background-color: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-primary);
            border-radius: 6px;
            padding: 2px 6px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            color: var(--color-accent);
        }

        .markdown-content pre {
            background-color: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-primary);
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .markdown-content pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--color-text-primary);
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-left: 20px;
            margin-bottom: 16px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 16px 0;
            border: 1px solid var(--color-border-primary);
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--color-accent);
            padding-left: 16px;
            margin-left: 0;
            margin-bottom: 16px;
            color: var(--color-text-secondary);
        }

        .projects-container {
            display: flex;
            gap: 40px;
        }

        .projects-sidebar {
            width: 200px;
            flex-shrink: 0;
        }

        .project-tabs {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .project-tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 15px;
            font-weight: 400;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
            text-align: left;
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .project-tab-btn:hover {
            color: var(--color-text-primary);
            background-color: var(--color-bg-tertiary);
        }

        .project-tab-btn.active {
            color: var(--color-accent);
            border-left-color: var(--color-accent);
            background-color: var(--color-bg-tertiary);
        }

        .projects-content {
            flex: 1;
        }

        .project-content {
            display: none;
        }

        .project-content.active {
            display: block;
        }

        .project-content h2 {
            margin-top: 0;
        }

        .project-tags {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-tag {
            display: inline-block;
            background-color: var(--color-bg-tertiary);
            color: var(--color-accent);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
        }

        .loading {
            color: var(--color-text-secondary);
            font-style: italic;
        }

        .error {
            background-color: var(--color-bg-tertiary);
            border: 1px solid #da3633;
            border-radius: 6px;
            padding: 12px;
            color: #f85149;
            margin-bottom: 16px;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border-primary);
            justify-content: space-between;
        }

        .nav-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border-primary);
            border-radius: 6px;
            color: var(--color-accent);
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-button:hover {
            background-color: var(--color-bg-tertiary);
            color: var(--color-accent-hover);
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-button.prev {
            margin-right: auto;
        }

        .nav-button.next {
            margin-left: auto;
        }

        .nav-spacer {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a class="logo" onclick="navigateTo('home'); return false;">📚 Docs</a>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav id="sidebar-nav" class="sidebar-nav">
                <!-- Generated from manifest.json -->
            </nav>
        </aside>

        <!-- Content -->
        <main class="content">
            <div id="content" class="markdown-content">
                <p class="loading">Loading...</p>
            </div>
        </main>
    </div>

    <script>
        let manifest = {
          "sections": [
            {
              "title": "About Me",
              "id": "about"
            },
            {
              "title": "Projects",
              "children": [
                {
                  "title": "Demet Fursuit",
                  "id": "project-demet"
                },
                {
                  "title": "Light Up Trailer",
                  "id": "project-trailer"
                },
                {
                  "title": "Badge App",
                  "id": "project-badge"
                }
              ]
            },
            {
              "title": "Socials",
              "id": "socials"
            }
          ]
        };

        let pages = {
          "about": `# About Me

Hey! My name is Demet, and I am an electrical engineering student and employee of Penn State. At my day job I get to either work on really boring stuff or really cool stuff. My night job is making Fursuits that light up!

## Background

I come from a town in the middle of nowhere. My dream since I was 3 was to be an inventor to help people. Currently I work at an innovation lab that does product design for the community for free. Not many people can say they got their lifelong dream job at 19.

## My Major Fixations

My 2 major fixations are LED lights and electric conversions on cars. Eventually I will build a really sick old farm truck style vehicle with a stupid 0-60.

## When I'm Not Engineering

When I'm not pulling 14 hour days working on engineering stuff, I love:
- Listening to music
- Playing games
- Dreaming about space

---

Check out my [Projects](#) to see what I'm working on, or hit me up on [Socials](#)!`,

          "socials": `# Socials

Connect with me on the platforms I'm active on.

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0;">
  <a href="https://www.youtube.com/@McJDTo" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">YouTube</a>
  <a href="https://www.tiktok.com/@mcjdt.o" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">TikTok</a>
  <a href="https://www.instagram.com/mcjdt.o" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">Instagram</a>
  <a href="https://x.com/McJDTo" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">Twitter / X</a>
  <a href="https://linktr.ee/McJDT.o" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">Linktree</a>
  <a href="https://discord.gg/SbQ9qDGSHX" style="display: inline-block; padding: 20px 32px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 18px; text-align: center; transition: background-color 0.2s;">Discord</a>
</div>`,

          "project-demet": `# Demet Fursuit

My fursuit originated from a need to test real-time audio effects at my day job. I had an idea from seeing someone's fursuit with a strip of lights to make a fursuit head that fully lights up. After countless hours of blood, sweat, and tears (and a cool ass scar), Demet 1.0 was born into the world.

After a couple million views at MFF, I knew that it needed a lot of work to be actually worn instead of being carried around. The idea of Demet 2.0 was born on the drive home—the idea was to cram as much tech as possible into one suit.

<div class="project-tags">
  <span class="project-tag">LED</span>
  <span class="project-tag">Audio Effects</span>
  <span class="project-tag">3D Graphics</span>
  <span class="project-tag">Voice Assistant</span>
</div>

## Current Features

- 3D effects
- 3D Drawing
- Fursuit pattern cloning
- Voice assistant
- Real-time audio effects
- Video playback

## Status

Currently a head and tail with a backpack for controls and power. The plan is to turn it into a full light up suit. The only thing holding it back from doing everything is the software!

## Feedback

This is an ever-evolving project. If you have ideas for future improvements, reach out. Half the features came from suggestions!`,

          "project-trailer": `# Light Up Trailer

At work, the most interesting thing I am working on is converting a light up trailer from a shitty LED control system to something actually usable.

## The Problem

The old system would take 10 hours of programming lights per 1 minute of music. It was extremely inefficient and limited what you could do.

<div class="project-tags">
  <span class="project-tag">LED Matrix</span>
  <span class="project-tag">Bluetooth</span>
  <span class="project-tag">5000+ LEDs</span>
</div>

## Current Progress

- Converted from terrible LED control system to Bluetooth
- Video playback working on a matrix of 5000+ LEDs
- Significantly reduced programming time

## Vision

A fully synchronized light show that can be controlled via Bluetooth and sync to music in real-time.`,

          "project-badge": `# Badge App

An app I work on in my free time. I am hoping to revolutionize how people show off digital art at IRL events.

<div class="project-tags">
  <span class="project-tag">Digital Art</span>
  <span class="project-tag">Events</span>
  <span class="project-tag">Community</span>
</div>

## Vision

Make it easy for artists to display their digital work at conventions and events in a way that's engaging and interactive.

## Status

More updates to come!`
        };

        let currentPageId = null;

        // Initialize
        function init() {
            buildSidebar();

            // Navigate to about or URL parameter
            const params = new URLSearchParams(window.location.search);
            const pageId = params.get('page') || 'about';
            navigateTo(pageId);
        }

        // Build sidebar from manifest
        function buildSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';

            manifest.sections.forEach(section => {
                if (section.children) {
                    // Section with children
                    const title = document.createElement('li');
                    title.className = 'sidebar-section-title';
                    title.textContent = section.title;
                    nav.appendChild(title);

                    const list = document.createElement('ul');
                    list.className = 'sidebar-children';
                    section.children.forEach(child => {
                        const item = createNavLink(child);
                        list.appendChild(item);
                    });
                    nav.appendChild(list);
                } else {
                    // Single item
                    const item = createNavLink(section);
                    nav.appendChild(item);
                }
            });
        }

        // Create a navigation link
        function createNavLink(page) {
            const li = document.createElement('li');
            li.className = 'sidebar-nav-item';

            const a = document.createElement('a');
            a.className = 'sidebar-nav-link';
            a.textContent = page.title;
            a.onclick = () => {
                navigateTo(page.id);
                return false;
            };

            li.appendChild(a);
            return li;
        }

        // Navigate to a page
        function navigateTo(pageId) {
            currentPageId = pageId;

            // Find the page in manifest
            const page = findPageById(pageId);
            if (!page) {
                showError(`Page "${pageId}" not found`);
                return;
            }

            // Update active link
            document.querySelectorAll('.sidebar-nav-link').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelectorAll('.sidebar-nav-link').forEach(link => {
                if (link.textContent === page.title) {
                    link.classList.add('active');
                }
            });

            // Load and render markdown
            loadAndRenderMarkdown(pageId);

            // Update URL
            window.history.pushState({}, '', `?page=${pageId}`);
        }

        // Find a page by ID recursively
        function findPageById(id) {
            for (const section of manifest.sections) {
                if (section.id === id) return section;
                if (section.children) {
                    for (const child of section.children) {
                        if (child.id === id) return child;
                    }
                }
            }
            return null;
        }

        // Get all pages in order (flattened)
        function getAllPages() {
            const pages = [];
            manifest.sections.forEach(section => {
                if (section.children) {
                    section.children.forEach(child => {
                        pages.push(child);
                    });
                } else {
                    pages.push(section);
                }
            });
            return pages;
        }

        // Get next and previous page info
        function getNavigation(currentPageId) {
            const allPages = getAllPages();
            const currentIndex = allPages.findIndex(p => p.id === currentPageId);

            const prev = currentIndex > 0 ? allPages[currentIndex - 1] : null;
            const next = currentIndex < allPages.length - 1 ? allPages[currentIndex + 1] : null;

            return { prev, next };
        }

        // Add navigation buttons
        function addNavigationButtons(pageId) {
            const { prev, next } = getNavigation(pageId);
            const content = document.getElementById('content');

            const navDiv = document.createElement('div');
            navDiv.className = 'nav-buttons';

            if (prev) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'nav-button prev';
                prevBtn.innerHTML = '← ' + prev.title;
                prevBtn.onclick = () => navigateTo(prev.id);
                navDiv.appendChild(prevBtn);
            }

            if (next) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'nav-button next';
                nextBtn.innerHTML = next.title + ' →';
                nextBtn.onclick = () => navigateTo(next.id);
                navDiv.appendChild(nextBtn);
            }

            if (prev || next) {
                content.appendChild(navDiv);
            }
        }

        // Load and render markdown content
        function loadAndRenderMarkdown(pageId) {
            const content = document.getElementById('content');

            if (!pages[pageId]) {
                showError(`Page "${pageId}" not found`);
                return;
            }

            const markdown = pages[pageId];
            const html = marked.parse(markdown);
            content.innerHTML = html;

            // Add navigation buttons
            addNavigationButtons(pageId);

            // Setup tabs if on projects page
            if (pageId === 'projects') {
                setupProjectTabs();
            }
        }

        // Setup project tabs functionality
        function setupProjectTabs() {
            const tabs = document.querySelectorAll('.project-tab-btn');
            const contents = document.querySelectorAll('.project-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const projectId = this.getAttribute('data-project');

                    // Remove active from all
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));

                    // Add active to selected
                    this.classList.add('active');
                    document.querySelector(`[data-project-id="${projectId}"]`).classList.add('active');
                });
            });
        }

        // Show error message
        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        window.addEventListener('load', init);

        // Handle back/forward buttons
        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            const pageId = params.get('page') || 'about';
            navigateTo(pageId);
        });
    </script>
</body>
</html>
