<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg-primary: #0d1117;
            --color-bg-secondary: #161b22;
            --color-bg-tertiary: #21262d;
            --color-border-primary: #30363d;
            --color-text-primary: #c9d1d9;
            --color-text-secondary: #8b949e;
            --color-accent: #58a6ff;
            --color-accent-hover: #79c0ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .welcome-container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--color-text-primary);
        }

        .name {
            color: var(--color-accent);
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .socials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 48px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border-primary);
            border-radius: 6px;
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .social-link:hover {
            background-color: var(--color-bg-tertiary);
            border-color: var(--color-accent);
            color: var(--color-accent-hover);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 48px;
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--color-accent);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome <span class="name" id="visitor-name">there</span>!</h1>

        <div class="socials-grid">
            <a href="https://www.youtube.com/@McJDTo" class="social-link">YouTube</a>
            <a href="https://www.tiktok.com/@mcjdt.o" class="social-link">TikTok</a>
            <a href="https://www.instagram.com/mcjdt.o" class="social-link">Instagram</a>
            <a href="https://x.com/McJDTo" class="social-link">Twitter/X</a>
            <a href="https://linktr.ee/McJDT.o" class="social-link">Linktree</a>
            <a href="https://discord.gg/SbQ9qDGSHX" class="social-link">Discord</a>
        </div>

        <a href="/" class="back-link">← Back to main site</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');

        if (name) {
            document.getElementById('visitor-name').textContent = name;
            document.title = `Welcome ${name}`;
        }
    </script>
</body>
</html>
